<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Notas - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">📓 Mis Notas Privadas</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <h5>Nueva Nota</h5>
                    <form action="/add_note" method="POST">
                        <textarea name="content" class="form-control mb-2" placeholder="Escribe algo..." required></textarea>
                        <button type="submit" class="btn btn-primary">Guardar Nota</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <h5>Tus Notas Guardadas</h5>
                <div class="list-group">
                    {% for nota in notes %}
                    <div class="list-group-item">
                        <p class="mb-1">{{ nota[0] }}</p> </div>
                    {% else %}
                    <p class="text-muted">Aún no tienes notas. ¡Escribe la primera!</p>
                    {% endfor %}
                </div>
            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
